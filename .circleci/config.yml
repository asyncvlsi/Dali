version: 2.1

jobs:
  ubuntu22: # Ubuntu 22
    docker:
      - image: ubuntu:22.04
    steps:
      - run:
          name: "Install checkout dependencies"
          command: |
            apt update -y
            apt install -y git openssh-client
      - when:
          condition:
            equal: ["https://github.com/asyncvlsi/Dali", << pipeline.project.git_url >>]
          steps:
            - run:
                name: "Checkout Dali over HTTPS"
                command: |
                  echo "Checking out ${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}"
                  echo "CircleCI branch: ${CIRCLE_BRANCH:-<none>}"
                  echo "CircleCI SHA: ${CIRCLE_SHA1}"
                  repo_url="https://github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}.git"
                  echo "Repository URL: ${repo_url}"
                  git clone "${repo_url}" Dali
                  cd Dali
                  git checkout "$CIRCLE_SHA1"
                  echo "Checked-out Dali remote: $(git remote get-url origin)"
                  echo "Checked-out Dali HEAD: $(git rev-parse HEAD)"
                  echo "Checked-out Dali commit: $(git log -1 --oneline)"
                  git submodule sync --recursive
                  git submodule update --init --recursive
      - unless:
          condition:
            equal: ["https://github.com/asyncvlsi/Dali", << pipeline.project.git_url >>]
          steps:
            - checkout:
                path: Dali
            - run:
                name: "Log Dali checkout"
                command: |
                  cd Dali
                  echo "Checked-out Dali remote: $(git remote get-url origin)"
                  echo "Checked-out Dali HEAD: $(git rev-parse HEAD)"
                  echo "Checked-out Dali commit: $(git log -1 --oneline)"
                  git submodule sync --recursive
                  git submodule update --init --recursive
      - run:
          name: "Install ACT"
          command: |
            apt update -y
            apt install -y build-essential git
            apt install -y libedit-dev zlib1g-dev m4
            DEBIAN_FRONTEND=noninteractive TZ=Etc/UTC apt install -y tzdata
            git clone https://github.com/asyncvlsi/act.git
            cd act
            mkdir install
            export VLSI_TOOLS_SRC=`pwd`
            export ACT_HOME=$VLSI_TOOLS_SRC/install
            echo export VLSI_TOOLS_SRC=`pwd` >> $BASH_ENV
            echo export ACT_HOME=$VLSI_TOOLS_SRC/install >> $BASH_ENV
            ./configure $ACT_HOME
            ./build
            make install
      - run:
          name: "Install Si2 LEF/DEF parser"
          command: |
            git clone https://github.com/asyncvlsi/lefdef.git
            apt-get install -y flex bison
            cd lefdef
            make
            make install
      - run:
          name: "Install phyDB"
          command: |
            apt install -y cmake libboost-all-dev
            git clone https://github.com/asyncvlsi/phyDB.git
            cd phyDB
            mkdir build
            cd build
            cmake ..
            make install
      - run:
          name: "Install Dali"
          command: |
            apt install -y libgtest-dev
            cd Dali
            mkdir build
            cd build
            cmake ..
            make
            mkdir -p test-results
            ctest --output-on-failure --output-junit test-results/ctest-results.xml
            make install
      - store_test_results:
          path: Dali/build/test-results
workflows:
  build:
    jobs:
      - ubuntu22
